# Expected keywords and forbidden patterns for lesson10_Dev example scripts
#
# This file is used by the test suite to validate that example scripts run successfully
# and produce expected output. Add an entry for each new script you create.
#
# Format:
#   forbidden_patterns: List of regex patterns that should NOT appear in any output
#   scripts: Mapping of script paths to their validation rules
#     - keywords: List of regex patterns; at least one must match the output
#     - skip: (optional) Set to true to skip testing this script
#     - requires_env: (optional) Set to true if script needs API keys

# Global blacklist - these patterns indicate failures
# Use specific patterns to avoid false positives from intentional error demonstrations
# Note: These are checked after script runs, not during parsing of valid output
forbidden_patterns:
  - "TypeError:"
  - "ValueError:"
  - "KeyError:"
  - "AttributeError:"
  - "ImportError:"
  - "ModuleNotFoundError:"
  - "ConnectionError:"
  - "TimeoutError:"
  - "Failed to connect"
  - "UnicodeEncodeError:"

# Per-script validation rules
scripts:
  # Quickstart examples
  "src/lesson10_Dev/1010_Langchain/101010 Quickstart/10101010 Build a basic agent.py":
    keywords:
      - "weather"
      - "sunny"
      - "sf"
    requires_env: true

  "src/lesson10_Dev/1010_Langchain/101010 Quickstart/10101020 Build a real-world agent.py":
    keywords:
      - "weather"
      - "location"
      - "structured_response"
    requires_env: true
    skip: true # Has TypeError with unexpected 'top_k' argument - needs fixing

  # Agent examples
  "src/lesson10_Dev/1010_Langchain/101020 Agents/10102010 Dynamic model.py":
    keywords:
      - "search|weather"
      - "model"
    requires_env: true

  "src/lesson10_Dev/1010_Langchain/101020 Agents/10102020 Tool error handling.py":
    keywords:
      - "divide"
      - "Tool error: Please check your input" # This is the intentional error message
      - "division by zero"
    requires_env: true

  "src/lesson10_Dev/1010_Langchain/101020 Agents/10102030 Tool use in ReAct loop.py":
